<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
  text { font-family: 'Cambria','Times New Roman',serif; }
  .title { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
  .label { font-size: 10px; fill: #1a1a1a; }
  .label-b { font-size: 10px; fill: #1a1a1a; font-weight: 600; }
  .label-sm { font-size: 9px; fill: #555; }
  .label-it { font-size: 9px; fill: #555; font-style: italic; }
  .label-w { font-size: 9px; fill: #fff; }
  .label-bw { font-size: 10px; fill: #fff; font-weight: 600; }
  .math { font-family: 'Cambria Math','Cambria',serif; font-size: 9px; fill: #555; font-style: italic; }
  .caption { font-size: 9px; fill: #444; }
  .box { fill: #fff; stroke: #1a1a1a; stroke-width: 0.8; }
  .box-shade { fill: #f0f0f0; stroke: #1a1a1a; stroke-width: 0.8; }
  .box-dark { fill: #444; stroke: #1a1a1a; stroke-width: 0.8; }
  .box-mid { fill: #c0c0c0; stroke: #1a1a1a; stroke-width: 0.8; }
  .box-dashed { fill: none; stroke: #888; stroke-width: 0.6; stroke-dasharray: 5 3; }
  .arr { stroke: #1a1a1a; stroke-width: 1; fill: none; }
  .arr-feedback { stroke: #555; stroke-width: 1; fill: none; stroke-dasharray: 8 4; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#1a1a1a"/>
  </marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#555"/>
  </marker>
</defs>

<text class="title" x="40" y="20">Figure 5. Cybernetic MLOps pipeline: end-to-end inference-audit-learning feedback loop</text>

<!-- ================================================================ -->
<!-- ROW 1: INFERENCE (Sidecar Pod)                                    -->
<!-- ================================================================ -->
<rect x="80" y="40" width="520" height="56" rx="4" class="box-dashed"/>
<text class="label-sm" x="96" y="55">Kubernetes pod (Sidecar pattern)</text>

<!-- Container A -->
<rect x="96" y="62" width="180" height="28" rx="3" class="box-shade"/>
<text class="label-b" x="186" y="80" text-anchor="middle">Container A : Neural model</text>

<!-- Container B -->
<rect x="310" y="62" width="180" height="28" rx="3" class="box-shade"/>
<text class="label-b" x="400" y="80" text-anchor="middle">Container B : Q-FENG auditor</text>

<!-- gRPC arrow between containers -->
<line x1="276" y1="76" x2="308" y2="76" class="arr" marker-end="url(#ah)"/>
<text class="label-sm" x="292" y="70" text-anchor="middle">gRPC</text>

<!-- Arrow: |psi_N> from A -->
<text class="math" x="240" y="90">|psi_N&gt;</text>
<!-- Arrow: |psi_S> to B -->
<text class="math" x="378" y="90">|psi_S&gt;</text>

<!-- ================================================================ -->
<!-- STEP 0 (implicit): theta computation inside Container B           -->
<!-- Arrow down from pod to Circuit Breaker                            -->
<!-- ================================================================ -->
<line x1="340" y1="96" x2="340" y2="124" class="arr" marker-end="url(#ah)"/>
<text class="math" x="348" y="114">theta = arccos(&lt;psi_N|psi_S&gt;)</text>

<!-- ================================================================ -->
<!-- STEP 1: CIRCUIT BREAKER (diamond)                                 -->
<!-- ================================================================ -->
<polygon points="340,128 390,156 340,184 290,156" fill="#e8e8e8" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="label-b" x="340" y="153" text-anchor="middle">Circuit</text>
<text class="label-b" x="340" y="165" text-anchor="middle">breaker</text>

<!-- Two outcomes from Circuit Breaker -->
<!-- LEFT: STAC (pass) -->
<path d="M290 156 L180 156 L180 190" class="arr" fill="none" marker-end="url(#ah)"/>
<text class="label-sm" x="226" y="148">pass</text>
<rect x="120" y="194" width="120" height="32" rx="3" class="box"/>
<text class="label-b" x="180" y="210" text-anchor="middle">STAC output</text>
<text class="label-it" x="180" y="222" text-anchor="middle">Action executed</text>

<!-- RIGHT: BLOCK -->
<path d="M390 156 L500 156 L500 190" class="arr" fill="none" marker-end="url(#ah)"/>
<text class="label-sm" x="454" y="148">block</text>
<rect x="440" y="194" width="120" height="32" rx="3" class="box-dark"/>
<text class="label-bw" x="500" y="210" text-anchor="middle">Block + diagnosis</text>
<text class="label-w" x="500" y="222" text-anchor="middle">Routed to HITL</text>

<!-- ================================================================ -->
<!-- BOTH outcomes log to Ontological Feature Store                    -->
<!-- ================================================================ -->
<line x1="180" y1="226" x2="180" y2="262" class="arr" marker-end="url(#ah)"/>
<line x1="500" y1="226" x2="500" y2="262" class="arr" marker-end="url(#ah)"/>

<rect x="110" y="266" width="460" height="36" rx="4" class="box-mid"/>
<text class="label-b" x="340" y="282" text-anchor="middle" fill="#1a1a1a">Ontological Feature Store</text>
<text class="label-sm" x="340" y="296" text-anchor="middle">Logs: theta, STAC class, activated predicates, normative diagnosis</text>

<!-- ================================================================ -->
<!-- STEP 2: HITL CURATION                                             -->
<!-- ================================================================ -->
<line x1="340" y1="302" x2="340" y2="328" class="arr" marker-end="url(#ah)"/>

<rect x="220" y="332" width="240" height="40" rx="4" class="box"/>
<text class="label-b" x="340" y="350" text-anchor="middle">Step 2 : HITL curation</text>
<text class="label-it" x="340" y="364" text-anchor="middle">Expert annotates: true positive / false positive</text>

<!-- Step label on left -->
<text class="label-sm" x="210" y="356" text-anchor="end">Hard negatives</text>
<text class="label-it" x="210" y="368" text-anchor="end">/ positives</text>

<!-- ================================================================ -->
<!-- STEP 3: CONTINUOUS TRAINING                                       -->
<!-- ================================================================ -->
<line x1="340" y1="372" x2="340" y2="398" class="arr" marker-end="url(#ah)"/>

<rect x="180" y="402" width="320" height="40" rx="4" class="box-shade"/>
<text class="label-b" x="340" y="418" text-anchor="middle">Step 3 : Continuous training with L_Global</text>
<text class="math" x="340" y="434" text-anchor="middle">L_Global = L_Perf + lambda . max(0, -cos theta) + lambda_fair . FairnessLoss</text>

<!-- ================================================================ -->
<!-- STEP 4: SYMBOLIC UNIT TESTS                                       -->
<!-- ================================================================ -->
<line x1="340" y1="442" x2="340" y2="468" class="arr" marker-end="url(#ah)"/>

<rect x="210" y="472" width="260" height="36" rx="4" class="box"/>
<text class="label-b" x="340" y="488" text-anchor="middle">Step 4 : Symbolic unit tests</text>
<text class="label-it" x="340" y="502" text-anchor="middle">dPASP compliance battery + Sovereignty Index = 100%</text>

<!-- ================================================================ -->
<!-- SAFE DEPLOYMENT: feedback arrow back to Container A               -->
<!-- ================================================================ -->

<!-- Pass gate -->
<line x1="210" y1="490" x2="170" y2="490" class="arr"/>
<text class="label-sm" x="160" y="486" text-anchor="end">pass all</text>

<!-- Fail gate -->
<line x1="470" y1="490" x2="510" y2="490" class="arr"/>
<text class="label-sm" x="520" y="494" text-anchor="start">fail: block deploy</text>

<!-- Long feedback arrow: from "pass" back up to Container A -->
<path d="M170 490 L50 490 L50 76 L94 76" class="arr-feedback" marker-end="url(#ahg)"/>
<text class="label-sm" x="44" y="290" transform="rotate(-90,44,290)" text-anchor="middle">Safe deployment (model promoted to production)</text>

<!-- ================================================================ -->
<!-- STEP NUMBERS on right margin                                      -->
<!-- ================================================================ -->
<text class="label-b" x="630" y="80">1</text>
<text class="label-sm" x="624" y="93">Inference</text>

<text class="label-b" x="630" y="156">2</text>
<text class="label-sm" x="624" y="169">Detection</text>

<text class="label-b" x="630" y="284">3</text>
<text class="label-sm" x="624" y="297">Logging</text>

<text class="label-b" x="630" y="352">4</text>
<text class="label-sm" x="624" y="365">Curation</text>

<text class="label-b" x="630" y="422">5</text>
<text class="label-sm" x="624" y="435">Retraining</text>

<text class="label-b" x="630" y="490">6</text>
<text class="label-sm" x="624" y="503">Validation</text>

<!-- Caption -->
<text class="caption" x="340" y="534" text-anchor="middle">Figure 5. End-to-end cybernetic MLOps pipeline. Solid arrows: forward inference and governance flow. Long-dashed arrow:</text>
<text class="caption" x="340" y="546" text-anchor="middle">safe deployment feedback loop (model promoted only after passing all Symbolic Unit Tests and five-gate protocol).</text>
<text class="caption" x="340" y="558" text-anchor="middle">The cycle closes the learning loop: governance events become training signal, reducing Circuit Breaker activation rate over time.</text>
</svg>
