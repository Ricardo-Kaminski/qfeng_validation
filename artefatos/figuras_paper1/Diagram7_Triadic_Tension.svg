<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
  text { font-family: 'Cambria','Times New Roman',serif; }
  .title { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
  .label { font-size: 10px; fill: #1a1a1a; }
  .label-b { font-size: 10px; fill: #1a1a1a; font-weight: 600; }
  .label-sm { font-size: 9px; fill: #555; }
  .label-it { font-size: 9px; fill: #555; font-style: italic; }
  .label-bw { font-size: 10px; fill: #fff; font-weight: 600; }
  .label-w { font-size: 9px; fill: #fff; }
  .math { font-family: 'Cambria Math','Cambria',serif; font-size: 9px; fill: #555; font-style: italic; }
  .caption { font-size: 9px; fill: #444; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#1a1a1a"/>
  </marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#888"/>
  </marker>
</defs>

<text class="title" x="40" y="20">Figure 7. Triadic Tension in the SUS: three-force equilibrium mediated by Q-FENG</text>

<!-- ================================================================ -->
<!-- TRIANGLE GEOMETRY                                                 -->
<!-- Center at (340, 250). Vertices of equilateral triangle:           -->
<!-- Top: (340, 80)  Bottom-left: (120, 400)  Bottom-right: (560, 400)-->
<!-- ================================================================ -->

<!-- Triangle outline (subtle) -->
<polygon points="340,80 120,400 560,400" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- ================================================================ -->
<!-- VERTEX 1 (TOP): INTEGRITY                                         -->
<!-- ================================================================ -->
<rect x="260" y="48" width="160" height="56" rx="4" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="label-b" x="340" y="68" text-anchor="middle">Integrity</text>
<text class="label-sm" x="340" y="82" text-anchor="middle">Constitutional mandates</text>
<text class="label-sm" x="340" y="94" text-anchor="middle">Clinical safety, evidence-based medicine</text>

<!-- DATASUS databases feeding Integrity -->
<rect x="440" y="58" width="70" height="18" rx="2" fill="#fff" stroke="#999" stroke-width="0.4"/>
<text class="label-sm" x="475" y="71" text-anchor="middle">SINAN</text>
<rect x="440" y="82" width="70" height="18" rx="2" fill="#fff" stroke="#999" stroke-width="0.4"/>
<text class="label-sm" x="475" y="95" text-anchor="middle">SIH/SUS</text>
<line x1="440" y1="70" x2="422" y2="70" stroke="#999" stroke-width="0.4"/>
<line x1="440" y1="91" x2="422" y2="91" stroke="#999" stroke-width="0.4"/>

<!-- Q-FENG mapping -->
<text class="math" x="340" y="118" text-anchor="middle">|psi_S&gt; : CF Art. 196, Lei 8.080, SUS norms</text>

<!-- ================================================================ -->
<!-- VERTEX 2 (BOTTOM-LEFT): DOMINANCE                                 -->
<!-- ================================================================ -->
<rect x="40" y="374" width="160" height="56" rx="4" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="label-b" x="120" y="394" text-anchor="middle">Dominance</text>
<text class="label-sm" x="120" y="408" text-anchor="middle">Fiscal constraints</text>
<text class="label-sm" x="120" y="420" text-anchor="middle">Administrative efficiency</text>

<!-- DATASUS databases feeding Dominance -->
<rect x="40" y="340" width="70" height="18" rx="2" fill="#fff" stroke="#999" stroke-width="0.4"/>
<text class="label-sm" x="75" y="353" text-anchor="middle">SIA/SUS</text>
<rect x="120" y="340" width="70" height="18" rx="2" fill="#fff" stroke="#999" stroke-width="0.4"/>
<text class="label-sm" x="155" y="353" text-anchor="middle">CNES</text>
<line x1="90" y1="358" x2="100" y2="372" stroke="#999" stroke-width="0.4"/>
<line x1="148" y1="358" x2="140" y2="372" stroke="#999" stroke-width="0.4"/>

<!-- Q-FENG mapping -->
<text class="math" x="120" y="444" text-anchor="middle">Cost optimization, LOA/PPA</text>

<!-- ================================================================ -->
<!-- VERTEX 3 (BOTTOM-RIGHT): ADAPTATION                               -->
<!-- ================================================================ -->
<rect x="480" y="374" width="160" height="56" rx="4" fill="#e0e0e0" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="label-b" x="560" y="394" text-anchor="middle">Adaptation</text>
<text class="label-sm" x="560" y="408" text-anchor="middle">Epidemiological diversity</text>
<text class="label-sm" x="560" y="420" text-anchor="middle">Geographic inequality</text>

<!-- DATASUS databases feeding Adaptation -->
<rect x="490" y="340" width="70" height="18" rx="2" fill="#fff" stroke="#999" stroke-width="0.4"/>
<text class="label-sm" x="525" y="353" text-anchor="middle">RNDS</text>
<rect x="570" y="340" width="70" height="18" rx="2" fill="#fff" stroke="#999" stroke-width="0.4"/>
<text class="label-sm" x="605" y="353" text-anchor="middle">SINAN</text>
<line x1="530" y1="358" x2="540" y2="372" stroke="#999" stroke-width="0.4"/>
<line x1="598" y1="358" x2="586" y2="372" stroke="#999" stroke-width="0.4"/>

<!-- Q-FENG mapping -->
<text class="math" x="560" y="444" text-anchor="middle">|psi_N&gt; : real-time epidem. signal</text>

<!-- ================================================================ -->
<!-- TENSION ARROWS (bidirectional between vertices)                    -->
<!-- ================================================================ -->

<!-- Integrity <-> Dominance -->
<line x1="270" y1="100" x2="190" y2="374" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ah)"/>
<line x1="180" y1="378" x2="276" y2="104" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ah)"/>
<text class="label-sm" x="192" y="230" transform="rotate(-68,192,230)" text-anchor="middle">Equity vs. cost</text>

<!-- Integrity <-> Adaptation -->
<line x1="410" y1="100" x2="490" y2="374" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ah)"/>
<line x1="500" y1="378" x2="404" y2="104" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ah)"/>
<text class="label-sm" x="488" y="230" transform="rotate(68,488,230)" text-anchor="middle">Protocol vs. diversity</text>

<!-- Dominance <-> Adaptation -->
<line x1="200" y1="406" x2="478" y2="406" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ah)"/>
<line x1="478" y1="396" x2="200" y2="396" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ah)"/>
<text class="label-sm" x="340" y="388" text-anchor="middle">Efficiency vs. responsiveness</text>

<!-- ================================================================ -->
<!-- CENTER: Q-FENG MEDIATION                                          -->
<!-- ================================================================ -->
<circle cx="340" cy="270" r="48" fill="#444" stroke="#1a1a1a" stroke-width="1"/>
<text class="label-bw" x="340" y="264" text-anchor="middle">Q-FENG</text>
<text class="label-w" x="340" y="278" text-anchor="middle">theta mediates</text>
<text class="label-w" x="340" y="290" text-anchor="middle">the tension</text>

<!-- Arrows from center to each vertex (mediation) -->
<line x1="340" y1="222" x2="340" y2="130" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ahg)"/>
<line x1="306" y1="306" x2="182" y2="374" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ahg)"/>
<line x1="374" y1="306" x2="498" y2="374" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ahg)"/>

<!-- ================================================================ -->
<!-- ANNOTATIONS                                                       -->
<!-- ================================================================ -->
<text class="label-sm" x="340" y="470" text-anchor="middle">When theta ~ 0 (constructive): all three forces converge. STAC authorized.</text>
<text class="label-sm" x="340" y="484" text-anchor="middle">When theta ~ pi (destructive): forces diverge. Circuit Breaker engages, routes to HITL.</text>
<text class="label-it" x="340" y="498" text-anchor="middle">Q-FENG does not eliminate the tension; it makes the tension computable and governable.</text>

<!-- Caption -->
<text class="caption" x="340" y="524" text-anchor="middle">Figure 7. The Triadic Tension in Brazil's SUS mapped onto the Q-FENG framework. Three irreducible forces -- Integrity</text>
<text class="caption" x="340" y="536" text-anchor="middle">(constitutional mandates), Dominance (fiscal constraints), and Adaptation (epidemiological diversity) -- are in permanent</text>
<text class="caption" x="340" y="548" text-anchor="middle">tension. Q-FENG mediates this tension through theta, providing a continuous measure of alignment at each inference cycle.</text>
</svg>
