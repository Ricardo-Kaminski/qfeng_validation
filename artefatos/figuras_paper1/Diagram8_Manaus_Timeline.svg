<text class="label-sm" x="354" y="378" text-anchor="middle">O2 logistics activated</text>
<text class="label-sm" x="354" y="390" text-anchor="middle">Patient transfers begin</text>
<line x1="340" y1="402" x2="340" y2="410" stroke="#888" stroke-width="0.5"/>

<!-- CF Event 4: Jan 8 — Crisis averted -->
<rect x="400" y="350" width="116" height="52" rx="3" fill="#e8e8e8" stroke="#1a1a1a" stroke-width="0.6"/>
<text class="label-b" x="458" y="368" text-anchor="middle">Crisis mitigated</text>
<text class="label-sm" x="458" y="380" text-anchor="middle">Supply chain active</text>
<text class="label-sm" x="458" y="392" text-anchor="middle">before collapse point</text>
<line x1="440" y1="402" x2="440" y2="410" stroke="#888" stroke-width="0.5"/>

<!-- Time saved annotation -->
<line x1="230" y1="416" x2="440" y2="416" stroke="#1a1a1a" stroke-width="0.8"/>
