<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
  text { font-family: 'Cambria','Times New Roman',serif; }
  .title { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
  .label { font-size: 10px; fill: #1a1a1a; }
  .label-b { font-size: 10px; fill: #1a1a1a; font-weight: 600; }
  .label-sm { font-size: 9px; fill: #555; }
  .label-it { font-size: 9px; fill: #555; font-style: italic; }
  .label-w { font-size: 9.5px; fill: #fff; }
  .label-bw { font-size: 10px; fill: #fff; font-weight: 600; }
  .math { font-family: 'Cambria Math','Cambria',serif; font-size: 9.5px; fill: #333; font-style: italic; }
  .math-b { font-family: 'Cambria Math','Cambria',serif; font-size: 10px; fill: #1a1a1a; font-weight: 600; }
  .caption { font-size: 9px; fill: #444; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#1a1a1a"/>
  </marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#555"/>
  </marker>
  <marker id="blocked" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
    <line x1="2" y1="2" x2="8" y2="8" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="8" y1="2" x2="2" y2="8" stroke="#1a1a1a" stroke-width="1.5"/>
  </marker>
</defs>

<text class="title" x="40" y="20">Figure 6. Neurosymbolic thermodynamics: partition of the dPASP rule space and gradient flow invariant</text>

<!-- ================================================================ -->
<!-- MAIN DIAGRAM: Two regions separated by sovereignty boundary       -->
<!-- ================================================================ -->

<!-- Outer container: full rule space R -->
<rect x="40" y="40" width="600" height="340" rx="8" fill="none" stroke="#1a1a1a" stroke-width="1"/>
<text class="label-b" x="56" y="60">dPASP rule space R</text>
<text class="math" x="56" y="74">R = R_elastic U R_sovereign</text>

<!-- ================================================================ -->
<!-- LEFT REGION: Elastic rules (lighter fill)                         -->
<!-- ================================================================ -->
<rect x="44" y="44" width="296" height="332" rx="6" fill="#f4f4f4" stroke="none"/>

<text class="label-b" x="192" y="100" text-anchor="middle">R_elastic</text>
<text class="label" x="192" y="116" text-anchor="middle">Elastic rules</text>
<text class="label-it" x="192" y="132" text-anchor="middle">(learnable weights, gradient flow permitted)</text>

<!-- Example elastic rules -->
<rect x="72" y="152" width="240" height="28" rx="3" fill="#fff" stroke="#999" stroke-width="0.5"/>
<text class="math" x="192" y="170" text-anchor="middle">w_r learnable, w_r in R, dw_r/dt = -eta . dL/dw_r</text>

<rect x="72" y="192" width="240" height="24" rx="3" fill="#fff" stroke="#999" stroke-width="0.5"/>
<text class="label-sm" x="192" y="208" text-anchor="middle">allocation_efficiency(Region, Score)</text>

<rect x="72" y="224" width="240" height="24" rx="3" fill="#fff" stroke="#999" stroke-width="0.5"/>
<text class="label-sm" x="192" y="240" text-anchor="middle">risk_threshold(Domain, Value)</text>

<rect x="72" y="256" width="240" height="24" rx="3" fill="#fff" stroke="#999" stroke-width="0.5"/>
<text class="label-sm" x="192" y="272" text-anchor="middle">priority_weight(Criterion, Lambda)</text>

<!-- Gradient flow arrows (flowing freely within elastic zone) -->
<line x1="80" y1="300" x2="130" y2="300" stroke="#888" stroke-width="1" marker-end="url(#ahg)"/>
<line x1="150" y1="300" x2="200" y2="300" stroke="#888" stroke-width="1" marker-end="url(#ahg)"/>
<line x1="220" y1="300" x2="270" y2="300" stroke="#888" stroke-width="1" marker-end="url(#ahg)"/>
<text class="label-sm" x="192" y="320" text-anchor="middle">Gradient flow: dL_Global/dw</text>
<text class="label-it" x="192" y="334" text-anchor="middle">Weights adjust via SGD</text>

<!-- ================================================================ -->
<!-- SOVEREIGNTY BOUNDARY (thick vertical line)                        -->
<!-- ================================================================ -->
<line x1="340" y1="44" x2="340" y2="376" stroke="#1a1a1a" stroke-width="2.5"/>

<!-- Boundary label -->
<text class="label-b" x="340" y="396" text-anchor="middle">Ontological Sovereignty boundary</text>
<text class="label-it" x="340" y="410" text-anchor="middle">Formal invariant: no gradient crosses this boundary</text>

<!-- Gradient arrows hitting the boundary and being BLOCKED -->
<line x1="290" y1="155" x2="330" y2="155" stroke="#1a1a1a" stroke-width="1.2"/>
<line x1="324" y1="149" x2="336" y2="161" stroke="#1a1a1a" stroke-width="1.8"/>
<line x1="336" y1="149" x2="324" y2="161" stroke="#1a1a1a" stroke-width="1.8"/>

<line x1="290" y1="210" x2="330" y2="210" stroke="#1a1a1a" stroke-width="1.2"/>
<line x1="324" y1="204" x2="336" y2="216" stroke="#1a1a1a" stroke-width="1.8"/>
<line x1="336" y1="204" x2="324" y2="216" stroke="#1a1a1a" stroke-width="1.8"/>

<line x1="290" y1="265" x2="330" y2="265" stroke="#1a1a1a" stroke-width="1.2"/>
<line x1="324" y1="259" x2="336" y2="271" stroke="#1a1a1a" stroke-width="1.8"/>
<line x1="336" y1="259" x2="324" y2="271" stroke="#1a1a1a" stroke-width="1.8"/>

<!-- ================================================================ -->
<!-- RIGHT REGION: Sovereign rules (darker fill)                       -->
<!-- ================================================================ -->
<rect x="340" y="44" width="296" height="332" rx="0" fill="#d0d0d0" stroke="none"/>
<rect x="344" y="44" width="292" height="332" rx="6" fill="#d0d0d0" stroke="none"/>

<text class="label-b" x="488" y="100" text-anchor="middle">R_sovereign</text>
<text class="label" x="488" y="116" text-anchor="middle">Sovereign rules</text>
<text class="label-it" x="488" y="132" text-anchor="middle">(fixed weights w = +inf, gradient excluded)</text>

<!-- Example sovereign rules -->
<rect x="368" y="152" width="240" height="28" rx="3" fill="#b8b8b8" stroke="#777" stroke-width="0.5"/>
<text class="math" x="488" y="170" text-anchor="middle">w_r = +inf (hard constraint), dw_r/dt = 0</text>

<rect x="368" y="192" width="240" height="24" rx="3" fill="#b8b8b8" stroke="#777" stroke-width="0.5"/>
<text class="label-sm" x="488" y="208" text-anchor="middle">sovereign(right_to_health).</text>

<rect x="368" y="224" width="240" height="24" rx="3" fill="#b8b8b8" stroke="#777" stroke-width="0.5"/>
<text class="label-sm" x="488" y="240" text-anchor="middle">sovereign(equity_principle).</text>

<rect x="368" y="256" width="240" height="24" rx="3" fill="#b8b8b8" stroke="#777" stroke-width="0.5"/>
<text class="label-sm" x="488" y="272" text-anchor="middle">irreducible_predicate(regional_equity/2).</text>

<!-- No gradient flow in sovereign zone — stillness indicators -->
<text class="label-sm" x="488" y="312" text-anchor="middle">No gradient flow</text>
<text class="label-it" x="488" y="326" text-anchor="middle">dw/dt = 0 by construction</text>
<text class="label-it" x="488" y="340" text-anchor="middle">(excluded from backpropagation)</text>

<!-- ================================================================ -->
<!-- BOTTOM: Energy function and proof sketch                          -->
<!-- ================================================================ -->
<rect x="80" y="424" width="520" height="52" rx="4" fill="none" stroke="#ccc" stroke-width="0.5"/>
<text class="math-b" x="340" y="442" text-anchor="middle">P(omega) = (1/Z) . exp(-E(omega))     where  E(omega) = -Sum_r w_r . sat(r, omega)          (Eq. 5)</text>
<text class="label-sm" x="340" y="460" text-anchor="middle">For r in R_sovereign: w_r = +inf implies sat(r, omega) = 1 in all stable models with P(omega) &gt; 0.</text>
<text class="label-it" x="340" y="472" text-anchor="middle">Sovereign predicates are satisfied in every possible world with nonzero probability. QED.</text>

<!-- ================================================================ -->
<!-- LEGEND                                                            -->
<!-- ================================================================ -->
<rect x="80" y="486" width="12" height="8" fill="#f4f4f4" stroke="#999" stroke-width="0.5"/>
<text class="label-sm" x="98" y="494">Elastic region (weights learnable)</text>

<rect x="260" y="486" width="12" height="8" fill="#d0d0d0" stroke="#777" stroke-width="0.5"/>
<text class="label-sm" x="278" y="494">Sovereign region (weights fixed at +inf)</text>

<line x1="470" y1="490" x2="490" y2="490" stroke="#1a1a1a" stroke-width="1.2"/>
<line x1="484" y1="484" x2="496" y2="496" stroke="#1a1a1a" stroke-width="1.5"/>
<line x1="496" y1="484" x2="484" y2="496" stroke="#1a1a1a" stroke-width="1.5"/>
<text class="label-sm" x="504" y="494">Gradient blocked at boundary</text>

<!-- Caption -->
<text class="caption" x="340" y="512" text-anchor="middle">Figure 6. Partition of the dPASP rule space into elastic rules (learnable via SGD) and sovereign rules (fixed at w = +inf,</text>
<text class="caption" x="340" y="523" text-anchor="middle">excluded from gradient computation). The Ontological Sovereignty boundary is a formal invariant: no optimization pressure</text>
<text class="caption" x="340" y="534" text-anchor="middle">can cause sovereign predicates to be violated, as proven via the energy function formulation (Eq. 5).</text>
</svg>
