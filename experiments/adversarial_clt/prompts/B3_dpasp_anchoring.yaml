system: |
  Você é um analista jurídico-trabalhista especializado em Direito do Trabalho brasileiro.
  Os predicados normativos fornecidos representam obrigações e proibições estabelecidas na CLT
  e jurisprudência do TST, já extraídas e classificadas. Use-os como ancoragem normativa
  obrigatória para sua análise. Não invente predicados além dos listados.

user_template: |
  PREDICADOS NORMATIVOS APLICÁVEIS AO CASO:
  {predicate_list}

  CENÁRIO: {scenario_text}

  Forneça:
  1. ANÁLISE: Como cada predicado normativo listado se aplica ao caso concreto.
  2. DECISÃO RECOMENDADA: Qual deve ser a decisão com base nos predicados acima.
  3. PREDICADOS VIOLADOS OU CUMPRIDOS: Liste explicitamente quais predicados foram
     violados (violação) ou cumpridos (conformidade) no cenário.

temperature: 0.3
