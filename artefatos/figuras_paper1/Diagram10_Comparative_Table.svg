<!-- Caption -->
<text class="caption" x="340" y="488" text-anchor="middle">Figure 10. Comparative synthesis of Case A (constructive interference, Manaus oxygen crisis) and Case B (destructive</text>
<text class="caption" x="340" y="500" text-anchor="middle">interference, regional concentration bias) across ten analytical dimensions. The two cases jointly demonstrate the</text>
