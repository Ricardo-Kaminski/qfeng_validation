<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
  text { font-family: 'Cambria','Times New Roman',serif; }
  .title { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
  .label { font-size: 10px; fill: #1a1a1a; }
  .label-b { font-size: 10px; fill: #1a1a1a; font-weight: 600; }
  .label-sm { font-size: 9px; fill: #555; }
  .label-it { font-size: 9px; fill: #555; font-style: italic; }
  .math { font-family: 'Cambria Math','Cambria',serif; font-size: 10px; fill: #333; font-style: italic; }
  .caption { font-size: 9px; fill: #444; }
  .box { fill: #fff; stroke: #1a1a1a; stroke-width: 0.8; }
  .box-shaded { fill: #f0f0f0; stroke: #1a1a1a; stroke-width: 0.8; }
  .box-dark { fill: #e0e0e0; stroke: #1a1a1a; stroke-width: 0.8; }
  .box-dashed { fill: none; stroke: #666; stroke-width: 0.6; stroke-dasharray: 5 3; }
  .arr { stroke: #1a1a1a; stroke-width: 1; fill: none; }
  .arr-thick { stroke: #1a1a1a; stroke-width: 1.4; fill: none; }
  .arr-dashed { stroke: #666; stroke-width: 0.8; fill: none; stroke-dasharray: 5 3; }
  .arr-feedback { stroke: #555; stroke-width: 1; fill: none; stroke-dasharray: 8 4; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#1a1a1a"/>
  </marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#555"/>
  </marker>
</defs>

<text class="title" x="40" y="20">Figure 2. Q-FENG cybernetic architecture: complete inference-audit-feedback cycle</text>

<!-- ================================================================ -->
<!-- ROW 1: INPUT DATA (top)                                          -->
<!-- ================================================================ -->
<rect x="258" y="38" width="164" height="36" rx="4" class="box-shaded"/>
<text class="label-b" x="340" y="53" text-anchor="middle">Input data</text>
<text class="label-sm" x="340" y="65" text-anchor="middle">Features, context</text>

<!-- Arrow down from input splitting into two paths -->
<line x1="340" y1="74" x2="340" y2="94" class="arr" marker-end="url(#ah)"/>

<!-- ================================================================ -->
<!-- ROW 2: S1 (Neural) and S5 (Normative) — parallel                 -->
<!-- ================================================================ -->

<!-- S1 Neural Model (left) -->
<rect x="80" y="100" width="180" height="56" rx="4" class="box"/>
<text class="label-b" x="170" y="120" text-anchor="middle">S1 : Neural model</text>
<text class="label-sm" x="170" y="134" text-anchor="middle">Ensemble ML/DL</text>
<text class="label-it" x="170" y="146" text-anchor="middle">produces |psi_N></text>

<!-- S5 Normative Engine (right) -->
<rect x="420" y="100" width="180" height="56" rx="4" class="box"/>
<text class="label-b" x="510" y="120" text-anchor="middle">S5 : Normative engine</text>
<text class="label-sm" x="510" y="134" text-anchor="middle">dPASP solver (Clingo)</text>
<text class="label-it" x="510" y="146" text-anchor="middle">produces |psi_S></text>

<!-- Arrows from input split to S1 and S5 -->
<path d="M340 94 L170 94 L170 100" class="arr" fill="none" marker-end="url(#ah)"/>
<path d="M340 94 L510 94 L510 100" class="arr" fill="none" marker-end="url(#ah)"/>

<!-- Parallel indicator -->
<text class="label-sm" x="340" y="130" text-anchor="middle">||</text>

<!-- ================================================================ -->
<!-- ROW 3: S3* Quantum Audit Channel (center)                        -->
<!-- ================================================================ -->

<!-- Dashed container for the audit zone -->
<rect x="120" y="180" width="440" height="80" rx="8" class="box-dashed"/>
<text class="label-sm" x="136" y="195">S3* : Quantum audit channel</text>

<!-- theta computation box inside -->
<rect x="230" y="200" width="220" height="44" rx="4" class="box-dark"/>
<text class="label-b" x="340" y="218" text-anchor="middle">theta = arccos( &lt;psi_N | psi_S&gt; )</text>
<text class="label-sm" x="340" y="234" text-anchor="middle">Ontological friction measurement</text>

<!-- Arrows from S1 and S5 down into audit zone -->
<line x1="170" y1="156" x2="170" y2="222" class="arr-thick"/>
<path d="M170 222 L228 222" class="arr-thick" marker-end="url(#ah)"/>
<text class="math" x="174" y="192">|psi_N></text>

<line x1="510" y1="156" x2="510" y2="222" class="arr-thick"/>
<path d="M510 222 L452 222" class="arr-thick" marker-end="url(#ah)"/>
<text class="math" x="482" y="192">|psi_S></text>

<!-- ================================================================ -->
<!-- ROW 4: CIRCUIT BREAKER (decision diamond)                        -->
<!-- ================================================================ -->
<line x1="340" y1="260" x2="340" y2="296" class="arr-thick" marker-end="url(#ah)"/>
<text class="math" x="348" y="284">theta</text>

<!-- Diamond shape for Circuit Breaker decision -->
<polygon points="340,300 400,340 340,380 280,340" class="box-shaded"/>
<text class="label-b" x="340" y="336" text-anchor="middle">Circuit</text>
<text class="label-b" x="340" y="349" text-anchor="middle">breaker</text>

<!-- Decision labels on diamond edges -->
<text class="label-sm" x="200" y="334" text-anchor="end">theta &lt; theta_crit</text>
<text class="label-sm" x="478" y="334" text-anchor="start">theta &gt; theta_crit</text>

<!-- ================================================================ -->
<!-- ROW 5: TWO OUTCOMES                                              -->
<!-- ================================================================ -->

<!-- LEFT outcome: STAC (Authorized execution) -->
<path d="M280 340 L120 340 L120 400" class="arr-thick" fill="none" marker-end="url(#ah)"/>
<rect x="40" y="404" width="160" height="56" rx="4" class="box"/>
<text class="label-b" x="120" y="424" text-anchor="middle">STAC</text>
<text class="label-sm" x="120" y="436" text-anchor="middle">Authorized execution</text>
<text class="label-it" x="120" y="448" text-anchor="middle">P(Action) amplified</text>

<!-- RIGHT outcome: Block + HITL -->
<path d="M400 340 L560 340 L560 400" class="arr-thick" fill="none" marker-end="url(#ah)"/>
<rect x="480" y="404" width="160" height="56" rx="4" class="box"/>
<text class="label-b" x="560" y="424" text-anchor="middle">Block + HITL audit</text>
<text class="label-sm" x="560" y="436" text-anchor="middle">Decision routed to human</text>
<text class="label-it" x="560" y="448" text-anchor="middle">P(Action) suppressed</text>

<!-- ================================================================ -->
<!-- ALGEDONIC SIGNAL (feedback from Block to S5)                     -->
<!-- ================================================================ -->
<path d="M640 432 L656 432 L656 128 L602 128" class="arr-feedback" marker-end="url(#ahg)"/>
<text class="label-sm" x="662" y="280" transform="rotate(90,662,280)" text-anchor="middle">Algedonic signal (S4 bypass)</text>

<!-- ================================================================ -->
<!-- ONTOLOGICAL FEATURE STORE (bottom center)                        -->
<!-- ================================================================ -->
<line x1="340" y1="380" x2="340" y2="490" class="arr-dashed" marker-end="url(#ahg)"/>
<rect x="220" y="494" width="240" height="44" rx="4" class="box-shaded"/>
<text class="label-b" x="340" y="512" text-anchor="middle">Ontological Feature Store</text>
<text class="label-sm" x="340" y="526" text-anchor="middle">Logs: theta, STAC, predicates, diagnosis</text>

<!-- Arrows from both outcomes to Feature Store -->
<path d="M120 460 L120 516 L218 516" class="arr-dashed" fill="none" marker-end="url(#ahg)"/>
<path d="M560 460 L560 516 L462 516" class="arr-dashed" fill="none" marker-end="url(#ahg)"/>

<!-- ================================================================ -->
<!-- CONTINUOUS TRAINING FEEDBACK (bottom, back to S1)                -->
<!-- ================================================================ -->
<path d="M220 520 L32 520 L32 128 L78 128" class="arr-feedback" marker-end="url(#ahg)"/>
<text class="label-sm" x="28" y="330" transform="rotate(-90,28,330)" text-anchor="middle">Continuous training (gradient from L_Global)</text>

<!-- ================================================================ -->
<!-- S5 KNOWLEDGE BASE annotation (top right)                         -->
<!-- ================================================================ -->
<rect x="420" y="38" width="180" height="40" rx="4" class="box-dashed"/>
<text class="label-sm" x="510" y="54" text-anchor="middle">S5 knowledge base</text>
<text class="label-it" x="510" y="66" text-anchor="middle">Sovereign + elastic predicates</text>
<line x1="510" y1="78" x2="510" y2="98" class="arr-dashed" marker-end="url(#ahg)"/>

<!-- Caption -->
<text class="caption" x="340" y="574" text-anchor="middle">Figure 2. Complete cybernetic inference-audit-feedback cycle of the Q-FENG architecture. Solid arrows: inference flow.</text>
<text class="caption" x="340" y="586" text-anchor="middle">Dashed arrows: logging and data flow. Long-dashed arrows: feedback channels (Algedonic Signal to S5; Continuous Training to S1).</text>
<text class="caption" x="340" y="598" text-anchor="middle">The Circuit Breaker operates at the theta computation output, routing to STAC (authorized) or Block/HITL (suppressed).</text>
</svg>
