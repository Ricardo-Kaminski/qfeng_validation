<line x1="176" y1="98" x2="190" y2="98" class="conn" marker-end="url(#ah)"/>
<line x1="292" y1="98" x2="306" y2="98" class="conn" marker-end="url(#ah)"/>
<line x1="408" y1="98" x2="422" y2="98" class="conn" marker-end="url(#ah)"/>
<line x1="524" y1="98" x2="538" y2="98" class="conn" marker-end="url(#ah)"/>

<text class="math" x="118" y="134">|psi_S> = constitutional norms</text>
<text class="math" x="118" y="146">|psi_N> = aggregate sectoral signals</text>
<text class="math" x="358" y="134" text-anchor="middle">theta_Macro</text>
<text class="label-it" x="420" y="134">Algedonic: escalation from Meso</text>
<text class="label-it" x="420" y="146">Circuit Breaker: regulatory intervention</text>

<!-- INTER-LEVEL Macro-Meso -->
<line x1="358" y1="120" x2="358" y2="230" class="conn-inter" marker-end="url(#ahg)"/>
<text class="label-sm" x="366" y="195">S3_Macro to S5_Meso</text>
<path d="M388 230 L388 170 L398 170 L398 120" class="conn-alhed" marker-end="url(#ahd)"/>
<text class="label-sm" x="404" y="180">Algedonic</text>

<!-- MESO -->
<rect x="40" y="234" width="600" height="186" rx="6" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
