<!-- Caption -->
<text class="caption" x="340" y="520" text-anchor="middle">Figure 8. Dual-track timeline of the January 2021 Manaus oxygen crisis. Top track: documented event sequence showing 72-hour</text>
<text class="caption" x="340" y="532" text-anchor="middle">delay between oxygen collapse and federal intervention. Bottom track: contrafactual Q-FENG-mediated sequence showing theta_eff</text>
