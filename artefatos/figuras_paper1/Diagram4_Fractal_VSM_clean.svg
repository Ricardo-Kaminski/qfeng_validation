<rect x="424" y="476" width="100" height="44" rx="3" class="sys-box s2"/>
<text class="label-b" x="474" y="494" text-anchor="middle">S2</text>
<text class="label-sm" x="474" y="508" text-anchor="middle">gRPC / mesh</text>
<rect x="540" y="476" width="86" height="44" rx="3" class="sys-box s1"/>
<text class="label-b" x="583" y="494" text-anchor="middle">S1</text>
<text class="label-sm" x="583" y="508" text-anchor="middle">Neural model</text>

<line x1="176" y1="498" x2="190" y2="498" class="conn" marker-end="url(#ah)"/>
<line x1="292" y1="498" x2="306" y2="498" class="conn" marker-end="url(#ah)"/>
<line x1="408" y1="498" x2="422" y2="498" class="conn" marker-end="url(#ah)"/>
<line x1="524" y1="498" x2="538" y2="498" class="conn" marker-end="url(#ah)"/>

<text class="math" x="118" y="534">|psi_S> = sovereign + elastic predicates</text>
<text class="math" x="118" y="546">|psi_N> = single inference output</text>
<text class="math" x="358" y="534" text-anchor="middle">theta_Micro</text>
<text class="label-it" x="420" y="534">Circuit Breaker: block + normative diagnosis</text>
<text class="label-it" x="420" y="546">Sidecar pattern (Container A + B)</text>

<!-- RIGHT MARGIN: Scale invariance -->
<text class="label-b" x="654" y="330" text-anchor="middle" transform="rotate(90,654,330)">Same S1-S5 structure at every scale (fractal recursion)</text>

<!-- LEGEND -->
<rect x="60" y="640" width="24" height="12" rx="2" class="sys-box s5"/>
<text class="label-sm" x="90" y="650">S5 (Identity / Policy)</text>
<rect x="200" y="640" width="24" height="12" rx="2" class="sys-box s3"/>
<text class="label-sm" x="230" y="650">S3 / S3* (Control / Audit)</text>
<rect x="380" y="640" width="24" height="12" rx="2" class="sys-box s1"/>
<text class="label-sm" x="410" y="650">S1 (Operation / Agency)</text>
<line x1="60" y1="664" x2="96" y2="664" class="conn-inter" marker-end="url(#ahg)"/>
