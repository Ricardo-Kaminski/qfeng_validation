<text class="label-sm" x="130" y="300" text-anchor="middle">2020</text>

<line x1="230" y1="264" x2="230" y2="276" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="label-sm" x="230" y="290" text-anchor="middle">Late Dec</text>
<text class="label-sm" x="230" y="300" text-anchor="middle">2020</text>

<line x1="340" y1="264" x2="340" y2="276" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="label-sm" x="340" y="290" text-anchor="middle">Jan 1-7</text>
<text class="label-sm" x="340" y="300" text-anchor="middle">2021</text>

<line x1="440" y1="264" x2="440" y2="276" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="label-sm" x="440" y="290" text-anchor="middle">Jan 8-14</text>
<text class="label-sm" x="440" y="300" text-anchor="middle">2021</text>

<line x1="540" y1="264" x2="540" y2="276" stroke="#1a1a1a" stroke-width="0.8"/>
