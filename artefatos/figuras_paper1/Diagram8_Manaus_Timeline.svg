<text class="label-it" x="554" y="114" text-anchor="middle">72+ hours late</text>
<line x1="540" y1="124" x2="540" y2="264" class="event-line"/>

<!-- Delay annotation -->
<line x1="440" y1="146" x2="540" y2="146" stroke="#1a1a1a" stroke-width="0.8" marker-end="url(#ah)"/>
<line x1="540" y1="146" x2="440" y2="146" stroke="#1a1a1a" stroke-width="0.8" marker-end="url(#ah)"/>
