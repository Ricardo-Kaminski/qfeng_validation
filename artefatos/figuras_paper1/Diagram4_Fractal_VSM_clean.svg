<rect x="308" y="276" width="100" height="44" rx="3" class="sys-box s3"/>
<text class="label-b" x="358" y="294" text-anchor="middle">S3</text>
<text class="label-sm" x="358" y="308" text-anchor="middle">Operational ctrl</text>
<rect x="424" y="276" width="100" height="44" rx="3" class="sys-box s2"/>
<text class="label-b" x="474" y="294" text-anchor="middle">S2</text>
<text class="label-sm" x="474" y="308" text-anchor="middle">Coordination</text>
<rect x="540" y="276" width="86" height="44" rx="3" class="sys-box s1"/>
<text class="label-b" x="583" y="294" text-anchor="middle">S1</text>
<text class="label-sm" x="583" y="308" text-anchor="middle">AI models</text>

<line x1="176" y1="298" x2="190" y2="298" class="conn" marker-end="url(#ah)"/>
<line x1="292" y1="298" x2="306" y2="298" class="conn" marker-end="url(#ah)"/>
<line x1="408" y1="298" x2="422" y2="298" class="conn" marker-end="url(#ah)"/>
<line x1="524" y1="298" x2="538" y2="298" class="conn" marker-end="url(#ah)"/>

<text class="math" x="118" y="334">|psi_S> = clinical protocols, SOP</text>
<text class="math" x="118" y="346">|psi_N> = institutional model outputs</text>
<text class="math" x="358" y="334" text-anchor="middle">theta_Meso</text>
<text class="label-it" x="420" y="334">Algedonic: escalation from Micro</text>
<text class="label-it" x="420" y="346">Circuit Breaker: institutional override</text>

<!-- INTER-LEVEL Meso-Micro -->
<line x1="358" y1="320" x2="358" y2="430" class="conn-inter" marker-end="url(#ahg)"/>
<text class="label-sm" x="366" y="395">S3_Meso to S5_Micro</text>
<path d="M388 430 L388 370 L398 370 L398 320" class="conn-alhed" marker-end="url(#ahd)"/>
<text class="label-sm" x="404" y="380">Algedonic</text>

<!-- MICRO -->
<rect x="40" y="434" width="600" height="186" rx="6" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="label-b" x="56" y="452">MICRO (Algorithm / Container)</text>
<text class="label-it" x="56" y="464">Clingo (ASP) predicates, model-specific constraints, Kubernetes sidecar</text>

<rect x="60" y="476" width="116" height="44" rx="3" class="sys-box s5"/>
