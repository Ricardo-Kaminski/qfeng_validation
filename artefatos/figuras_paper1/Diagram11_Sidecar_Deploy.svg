<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
  text { font-family: 'Cambria','Times New Roman',serif; }
  .title { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
  .label-b { font-size: 10px; fill: #1a1a1a; font-weight: 600; }
  .label-sm { font-size: 9px; fill: #555; }
  .label-it { font-size: 9px; fill: #555; font-style: italic; }
  .label-bw { font-size: 10px; fill: #fff; font-weight: 600; }
  .label-w { font-size: 9px; fill: #fff; }
  .math { font-family: 'Cambria Math','Cambria',serif; font-size: 9px; fill: #555; font-style: italic; }
  .caption { font-size: 9px; fill: #444; }
  .pod { fill: none; stroke: #1a1a1a; stroke-width: 1; stroke-dasharray: 8 4; rx: 8; }
  .container { stroke: #1a1a1a; stroke-width: 0.8; rx: 4; }
  .sub { stroke: #888; stroke-width: 0.5; rx: 3; }
  .ext { fill: #f4f4f4; stroke: #999; stroke-width: 0.6; rx: 4; }
  .infra { fill: #e0e0e0; stroke: #1a1a1a; stroke-width: 0.6; rx: 4; }
  .arr { stroke: #1a1a1a; stroke-width: 1; fill: none; }
  .arr-d { stroke: #888; stroke-width: 0.8; fill: none; stroke-dasharray: 5 3; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#1a1a1a"/>
  </marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 1L8 5L0 9Z" fill="#888"/>
  </marker>
</defs>

<text class="title" x="40" y="20">Figure 11. Sidecar deployment architecture: Kubernetes pod with co-located inference and governance containers</text>

<!-- ================================================================ -->
<!-- KUBERNETES POD (dashed container)                                  -->
<!-- ================================================================ -->
<rect x="60" y="44" width="560" height="200" class="pod"/>
<text class="label-sm" x="76" y="62">Kubernetes pod (single scheduling unit)</text>

<!-- ================================================================ -->
<!-- CONTAINER A: Neural Model (S1)                                    -->
<!-- ================================================================ -->
<rect x="80" y="72" width="220" height="152" class="container" fill="#f8f8f8"/>
<text class="label-b" x="190" y="92" text-anchor="middle">Container A (S1)</text>
<text class="label-sm" x="190" y="106" text-anchor="middle">Neural inference engine</text>

<!-- Sub-components inside Container A -->
<rect x="96" y="116" width="80" height="28" class="sub" fill="#e8e8e8"/>
<text class="label-sm" x="136" y="134" text-anchor="middle">LSTM</text>

<rect x="188" y="116" width="80" height="28" class="sub" fill="#e8e8e8"/>
<text class="label-sm" x="228" y="134" text-anchor="middle">LightGBM</text>

<rect x="136" y="156" width="96" height="28" class="sub" fill="#e8e8e8"/>
<text class="label-sm" x="184" y="174" text-anchor="middle">Meta-learner</text>

<!-- Output label -->
<text class="math" x="190" y="204" text-anchor="middle">Output: |psi_N&gt;</text>

<!-- ================================================================ -->
<!-- gRPC CHANNEL between containers                                   -->
<!-- ================================================================ -->
<line x1="300" y1="140" x2="378" y2="140" class="arr" marker-end="url(#ah)"/>
<line x1="378" y1="160" x2="300" y2="160" class="arr" marker-end="url(#ah)"/>
<text class="label-b" x="340" y="132" text-anchor="middle">gRPC</text>
<text class="label-it" x="340" y="174" text-anchor="middle">&lt; 50 ms</text>

<!-- ================================================================ -->
<!-- CONTAINER B: Q-FENG Auditor (S3*-S5)                              -->
<!-- ================================================================ -->
<rect x="380" y="72" width="220" height="152" class="container" fill="#e0e0e0"/>
<text class="label-b" x="490" y="92" text-anchor="middle">Container B (S3*-S5)</text>
<text class="label-sm" x="490" y="106" text-anchor="middle">Q-FENG auditor</text>

<!-- Sub-components inside Container B -->
<rect x="396" y="116" width="80" height="28" class="sub" fill="#ccc"/>
<text class="label-sm" x="436" y="134" text-anchor="middle">dPASP</text>

<rect x="488" y="116" width="80" height="28" class="sub" fill="#ccc"/>
<text class="label-sm" x="528" y="134" text-anchor="middle">theta engine</text>

<rect x="420" y="156" width="120" height="28" class="sub" fill="#aaa"/>
<text class="label-sm" x="480" y="174" text-anchor="middle">Circuit Breaker</text>

<!-- Output label -->
<text class="math" x="490" y="204" text-anchor="middle">Output: theta, STAC, diagnosis</text>

<!-- ================================================================ -->
<!-- EXTERNAL COMPONENTS (below pod)                                   -->
<!-- ================================================================ -->

<!-- Ontological Feature Store -->
<rect x="60" y="280" width="160" height="40" class="ext"/>
<text class="label-b" x="140" y="298" text-anchor="middle">Ontological Feature Store</text>
<text class="label-it" x="140" y="312" text-anchor="middle">Feast + theta/STAC logs</text>
<line x1="140" y1="244" x2="140" y2="278" class="arr-d" marker-end="url(#ahg)"/>

<!-- MLflow / DVC -->
<rect x="240" y="280" width="120" height="40" class="ext"/>
<text class="label-b" x="300" y="298" text-anchor="middle">MLflow / DVC</text>
<text class="label-it" x="300" y="312" text-anchor="middle">Triple versioning</text>
<line x1="260" y1="244" x2="280" y2="278" class="arr-d" marker-end="url(#ahg)"/>

<!-- S5 Knowledge Base / RAG -->
<rect x="380" y="280" width="120" height="40" class="ext"/>
<text class="label-b" x="440" y="298" text-anchor="middle">S5 knowledge base</text>
<text class="label-it" x="440" y="312" text-anchor="middle">RAG normativo</text>
<line x1="440" y1="278" x2="460" y2="244" class="arr-d" marker-end="url(#ahg)"/>

<!-- Audit log -->
<rect x="520" y="280" width="100" height="40" class="ext"/>
<text class="label-b" x="570" y="298" text-anchor="middle">Audit log</text>
<text class="label-it" x="570" y="312" text-anchor="middle">Compliance record</text>
<line x1="550" y1="244" x2="560" y2="278" class="arr-d" marker-end="url(#ahg)"/>

<!-- ================================================================ -->
<!-- INFRASTRUCTURE LAYER (bottom)                                     -->
<!-- ================================================================ -->
<rect x="140" y="350" width="400" height="36" class="infra"/>
<text class="label-b" x="340" y="368" text-anchor="middle">Infrastructure: Rede Ipe / CNDs RNP (Sao Paulo, Brasilia)</text>
<text class="label-it" x="340" y="382" text-anchor="middle">National research network backbone</text>

<!-- Connections from external components to infrastructure -->
<line x1="140" y1="320" x2="240" y2="348" class="arr-d" marker-end="url(#ahg)"/>
<line x1="300" y1="320" x2="320" y2="348" class="arr-d" marker-end="url(#ahg)"/>
<line x1="440" y1="320" x2="380" y2="348" class="arr-d" marker-end="url(#ahg)"/>
<line x1="570" y1="320" x2="480" y2="348" class="arr-d" marker-end="url(#ahg)"/>

<!-- ================================================================ -->
<!-- INVARIANTS (annotations, right margin)                            -->
<!-- ================================================================ -->
<text class="label-b" x="40" y="408">Architectural invariants:</text>
<text class="label-sm" x="40" y="422">1. No inference without audit: if Container B fails, the pod terminates (fail-safe).</text>
<text class="label-sm" x="40" y="436">2. Governance scales linearly: pod replication replicates both inference and audit capacity.</text>
<text class="label-sm" x="40" y="450">3. Model-agnostic: Container A accepts any model exposing a gRPC probability vector endpoint.</text>

<!-- Caption -->
<text class="caption" x="340" y="472" text-anchor="middle">Figure 11. Sidecar deployment architecture (adapted from Burns et al., 2016). Container A (neural model) and Container B</text>
<text class="caption" x="340" y="484" text-anchor="middle">(Q-FENG auditor) are co-located in a single Kubernetes pod, communicating via gRPC at sub-50ms latency. External persistence</text>
<text class="caption" x="340" y="496" text-anchor="middle">layer includes the Ontological Feature Store, triple versioning (MLflow/DVC), normative knowledge base, and audit log.</text>
</svg>
