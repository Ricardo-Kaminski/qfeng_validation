<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="740" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
  text { font-family: 'Cambria','Times New Roman',serif; }
  .title { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
  .label { font-size: 10px; fill: #1a1a1a; }
  .label-b { font-size: 10px; fill: #1a1a1a; font-weight: 600; }
  .label-sm { font-size: 9px; fill: #555; }
  .label-it { font-size: 9px; fill: #555; font-style: italic; }
  .math { font-family: 'Cambria Math','Cambria',serif; font-size: 9px; fill: #444; font-style: italic; }
  .caption { font-size: 9px; fill: #444; }
  .sys-box { stroke: #1a1a1a; stroke-width: 0.6; }
  .s5 { fill: #d8d8d8; }
  .s4 { fill: #e6e6e6; }
  .s3 { fill: #c8c8c8; }
  .s2 { fill: #e6e6e6; }
  .s1 { fill: #f0f0f0; }
  .conn { stroke: #1a1a1a; stroke-width: 1; fill: none; }
  .conn-inter { stroke: #555; stroke-width: 1.2; fill: none; stroke-dasharray: 8 4; }
  .conn-alhed { stroke: #333; stroke-width: 0.8; fill: none; stroke-dasharray: 3 3; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 1L8 5L0 9Z" fill="#1a1a1a"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 1L8 5L0 9Z" fill="#555"/></marker>
  <marker id="ahd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 1L8 5L0 9Z" fill="#333"/></marker>
</defs>

<!-- MACRO -->
<rect x="40" y="34" width="600" height="186" rx="6" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
<text class="label-b" x="56" y="52">MACRO (State / Regulatory)</text>
<text class="label-it" x="56" y="64">National AI ecosystem, constitutional norms, primary legislation</text>

<rect x="60" y="76" width="116" height="44" rx="3" class="sys-box s5"/>
<text class="label-b" x="118" y="94" text-anchor="middle">S5</text>
<text class="label-sm" x="118" y="108" text-anchor="middle">Constitution, LGPD</text>
<rect x="192" y="76" width="100" height="44" rx="3" class="sys-box s4"/>
<text class="label-b" x="242" y="94" text-anchor="middle">S4</text>
<text class="label-sm" x="242" y="108" text-anchor="middle">Strategic radar</text>
<rect x="308" y="76" width="100" height="44" rx="3" class="sys-box s3"/>
<text class="label-b" x="358" y="94" text-anchor="middle">S3</text>
<text class="label-sm" x="358" y="108" text-anchor="middle">Operational ctrl</text>
<rect x="424" y="76" width="100" height="44" rx="3" class="sys-box s2"/>
<text class="label-b" x="474" y="94" text-anchor="middle">S2</text>
<text class="label-sm" x="474" y="108" text-anchor="middle">Coordination</text>
<rect x="540" y="76" width="86" height="44" rx="3" class="sys-box s1"/>
